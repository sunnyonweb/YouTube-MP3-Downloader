<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube MP3 Downloader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>YouTube MP3 Downloader</h1>

  <div class="cookies-section">
    <p><strong>Optional:</strong> if a video asks for sign-in, upload your own YouTube cookies for this download only.</p>
    <ol>
      <li>Export cookies from your logged-in browser as <code>cookies.txt</code></li>
      <li>Select that file below before clicking Download</li>
    </ol>
    <input type="file" id="cookiesFile" accept=".txt,.json" />
  </div>

  <input type="text" id="youtubeUrl" placeholder="Paste YouTube Link Here">

  <button onclick="downloadAudio()">
    Download MP3
  </button>

  <p id="status"></p>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
